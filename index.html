<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Log-In</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!--Aqui vai a imagem no CSS-->
            </div>
            <div id="form">
                <h1>Login</h1>
                <p>Seja bem vindo! Faça LogIn para acessar a sua conta.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="email" name="login" id="ilogin" required autocomplete="email" placeholder="Email">
                        <label for="ilogin"></label>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <input type="password" name="passe" id="ipasse" required autocomplete="current-password" placeholder="Palavra-Passe">
                        <label for="ipasse"></label>
                    </div>
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar">
                    <a href="esqueci-html">Esqueci a palavra-passe
                        <span class="material-symbols-outlined">mail</span>
                    </a>
                </form>
            </div>
        </section> 
    </main>
</body>
</html>
